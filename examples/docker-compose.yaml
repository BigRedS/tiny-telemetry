# Run from repo root: docker compose -f examples/docker-compose.yaml up --build
# Or from here: docker compose up --build (build context must be repo root or set build context)
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel.yaml"]
    volumes:
      - ./otel.yaml:/etc/otel.yaml
    ports:
      - "4317:4317"
      - "4318:4318"

  tiny-telemetry:
    image: tiny-telemetry:latest
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      TELEMETRY_INTERVAL_SECONDS: 5
      FAILURE_RATE: 0.1
    depends_on:
      - otel-collector
